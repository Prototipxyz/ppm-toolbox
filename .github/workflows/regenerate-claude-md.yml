name: Regenerate CLAUDE.md

on:
  push:
    paths:
      - 'kb/**/*.md'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate CLAUDE.md from KB
        run: |
          python3 scripts/generate_claude_md.py

      - name: Commit updated CLAUDE.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE.md
          git diff --staged --quiet || git commit -m "chore: regenerate CLAUDE.md from KB update"
          git push
